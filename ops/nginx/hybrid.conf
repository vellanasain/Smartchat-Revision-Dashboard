server {
  listen 80;
  server_name _;

  location / {
    proxy_pass http://react-app:5173;
    proxy_set_header Host $host;
  }

  location /api/ {
    proxy_pass http://laravel:8000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /revisions {
    proxy_pass http://laravel:8000/revisions;
    proxy_set_header Host $host;
  }
  location /revisions/ {
    proxy_pass http://laravel:8000/revisions/;
    proxy_set_header Host $host;
  }

  location /go-api/ {
    proxy_set_header X-Trusted-Proxy "1";
    proxy_set_header X-Auth-Signature "dev-shared-key";
    proxy_pass http://go-api:8081/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /healthz {
    return 200 'ok';
    add_header Content-Type text/plain;
  }
}
